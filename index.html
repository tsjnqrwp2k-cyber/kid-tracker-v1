<!DOCTYPE html>
<html lang="en" data-theme="pastel">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="My Tracker" />
  <meta name="theme-color" content="#FF6B9D" />
  <title>My Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/themes.css" />
</head>
<body>

<header class="app-header">
  <button class="header-btn home-btn" data-nav="main" aria-label="Home">🏠</button>
  <div class="header-spacer"></div>
  <button id="mute-toggle" class="header-btn" aria-label="Mute">🔊</button>
  <button class="header-btn" data-nav="summary" aria-label="Summary">📊</button>
  <button class="header-btn" data-nav="settings" aria-label="Settings">⚙️</button>
  <button class="header-btn" data-nav="parent" aria-label="Parent menu">🔒</button>
</header>

<div id="update-banner-host" class="update-banner-host"></div>

<main id="app">
  <section id="view-main" class="view"></section>
  <section id="view-summary" class="view" hidden></section>
  <section id="view-settings" class="view" hidden></section>
  <section id="view-parent" class="view" hidden></section>
</main>

<div id="toast-host" class="toast-host" aria-live="polite"></div>
<div id="confetti-host" class="confetti-host" aria-hidden="true"></div>
<div id="modal-host" class="modal-host"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
